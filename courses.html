<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Courses - Learnify</title>
    <meta name="description" content="Browse all courses on Learnify. Learn web development, data science, design, and more.">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Global Navigation -->
    <header class="sticky-top w-100 px-4 px-md-5 py-3 d-flex align-items-center justify-content-between"
        style="z-index: 1030; background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);">
        <a href="index.html" class="fs-3 fw-semibold text-dark font-poppins text-decoration-none" style="letter-spacing: -0.025em;">
            learnify
        </a>
        <div class="d-flex align-items-center gap-3">
            <a href="index.html" class="btn fs-6 px-3 py-2 font-sans fw-bold border-0 text-muted">Home</a>
            <a href="cart.html"
                class="d-flex align-items-center justify-content-center p-2 rounded-circle transition-colors hover-bg-light position-relative"
                style="color: #4b5563; text-decoration: none; margin-right: 0.5rem;" title="View Cart">
                <span class="material-symbols-outlined" style="font-size: 1.5rem;">shopping_cart</span>
                <span id="global-cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.65rem;">
                    0
                </span>
            </a>
            <span id="nav-user-name" class="font-sans fw-bold text-dark d-none"></span>
            <a id="nav-panel-link" href="student-panel.html" class="btn fs-6 px-3 py-2 font-sans fw-bold border-0 d-none" style="color: #111827;">My Courses</a>
            <button id="nav-logout-btn" class="btn fs-6 px-3 py-2 font-sans fw-bold border-0 text-muted d-none" onclick="logout()">Log Out</button>
            <button id="nav-login-btn" class="btn fs-5 px-3 py-2 rounded-pill font-sans fw-bold border-0" style="color: #111827;" data-bs-toggle="modal" data-bs-target="#loginModal">Log In</button>
            <button id="nav-register-btn" class="btn px-4 py-2 rounded-pill fs-5 font-sans fw-bold border-0" style="background-color: #111827; color: white;" data-bs-toggle="modal" data-bs-target="#registerModal">Register</button>
        </div>
    </header>

    <main class="flex-grow-1">
        <!-- Page Header -->
        <section class="container-fluid px-4 px-md-5 pt-5 pb-4" style="max-width: 1400px;">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3">
                <div>
                    <h1 class="fw-bold font-sans mb-2" style="color: #111827; letter-spacing: -0.025em;">All Courses</h1>
                    <p class="text-muted font-sans mb-0">Explore our complete catalog and start learning today.</p>
                </div>
                <!-- Search -->
                <div class="position-relative">
                    <span class="material-symbols-outlined position-absolute top-50 translate-middle-y ms-3 text-muted" style="pointer-events: none;">search</span>
                    <input type="text" id="searchInput" class="form-control rounded-pill bg-white border-0 shadow-sm ps-5 py-2 font-sans"
                        placeholder="Search courses..." style="width: 280px;" oninput="filterCourses()">
                </div>
            </div>
        </section>

        <!-- Category Filters -->
        <section class="container-fluid px-4 px-md-5 pb-3 position-relative" style="max-width: 1400px;">
            <button id="scrollLeftBtn" onclick="scrollCategories(-300)" class="btn bg-white shadow rounded-circle position-absolute start-0 translate-middle-y z-3 d-flex align-items-center justify-content-center p-0" style="top: 40%; width: 36px; height: 36px; margin-left: 1.5rem; border: 1px solid #e5e7eb; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
                <span class="material-symbols-outlined text-muted" style="font-size: 20px;">chevron_left</span>
            </button>
            <div class="d-flex gap-2 overflow-auto pb-2" id="categoryBar" style="-ms-overflow-style:none; scrollbar-width:none;" onscroll="handleScrollButtons()">
                <!-- Populated via JS -->
            </div>
            <button id="scrollRightBtn" onclick="scrollCategories(300)" class="btn bg-white shadow rounded-circle position-absolute end-0 translate-middle-y z-3 d-flex align-items-center justify-content-center p-0" style="top: 40%; width: 36px; height: 36px; margin-right: 1.5rem; border: 1px solid #e5e7eb; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
                <span class="material-symbols-outlined text-muted" style="font-size: 20px;">chevron_right</span>
            </button>
        </section>

        <!-- Courses Grid -->
        <section class="container-fluid px-4 px-md-5 pb-5" style="max-width: 1400px;">
            <div id="coursesGrid" class="row g-4">
                <!-- Populated via JS -->
            </div>
            <div id="noCoursesMsg" class="text-center py-5 d-none">
                <span class="material-symbols-outlined text-muted d-block mb-3" style="font-size: 3rem;">search_off</span>
                <h4 class="font-sans fw-semibold text-muted">No courses found.</h4>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-top py-3 px-4 px-md-5 mt-auto text-center" style="border-color: #e5e7eb !important;">
        <p class="mb-0 fw-bold font-sans text-muted" style="font-size: 0.875rem;">© 2026 Learnify Inc. All rights reserved.</p>
    </footer>

    <!-- Toast notification -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" style="background-color: #111827;">
            <div class="d-flex">
                <div class="toast-body font-sans fw-medium" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="modal-title font-sans fw-bold fs-4" style="color: #111827;">Welcome Back</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 pt-3">
                    <div id="loginError" class="alert alert-danger d-none font-sans py-2"></div>
                    <form id="loginForm" onsubmit="submitLogin(event)">
                        <div class="mb-3">
                            <label class="form-label font-sans fw-semibold" style="color: #4b5563;">Email</label>
                            <input type="email" id="loginEmail" class="form-control rounded-3 py-2 bg-light border-0" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label font-sans fw-semibold" style="color: #4b5563;">Password</label>
                            <div class="input-group">
                                <input type="password" id="loginPassword" class="form-control rounded-start-3 py-2 bg-light border-0" placeholder="••••••••" required>
                                <button class="btn bg-light border-0 rounded-end-3 text-muted px-3" type="button" onclick="const p=document.getElementById('loginPassword'); p.type=p.type==='password'?'text':'password'; this.querySelector('span').textContent=p.type==='password'?'visibility':'visibility_off';">
                                    <span class="material-symbols-outlined align-middle" style="font-size: 20px;">visibility</span>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 font-sans fw-bold border-0">Sign In</button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted font-sans">Don't have an account? </span>
                        <a href="#" class="fw-bold text-dark" data-bs-dismiss="modal" data-bs-toggle="modal" data-bs-target="#registerModal">Register</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="modal-title font-sans fw-bold fs-4" style="color: #111827;">Create Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 pt-3">
                    <div id="registerError" class="alert alert-danger d-none font-sans py-2"></div>
                    <div id="registerSuccess" class="alert alert-success d-none font-sans py-2"></div>
                    <form id="registerForm" onsubmit="submitRegister(event)">
                        <div class="mb-3">
                            <label class="form-label font-sans fw-semibold" style="color: #4b5563;">Full Name</label>
                            <input type="text" id="regName" class="form-control rounded-3 py-2 bg-light border-0" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label font-sans fw-semibold" style="color: #4b5563;">Email</label>
                            <input type="email" id="regEmail" class="form-control rounded-3 py-2 bg-light border-0" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label font-sans fw-semibold" style="color: #4b5563;">Password</label>
                            <div class="input-group">
                                <input type="password" id="regPassword" class="form-control rounded-start-3 py-2 bg-light border-0" placeholder="At least 6 characters" required>
                                <button class="btn bg-light border-0 rounded-end-3 text-muted px-3" type="button" onclick="const p=document.getElementById('regPassword'); p.type=p.type==='password'?'text':'password'; this.querySelector('span').textContent=p.type==='password'?'visibility':'visibility_off';">
                                    <span class="material-symbols-outlined align-middle" style="font-size: 20px;">visibility</span>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 font-sans fw-bold border-0">Sign Up</button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted font-sans">Already have an account? </span>
                        <a href="#" class="fw-bold text-dark" data-bs-dismiss="modal" data-bs-toggle="modal" data-bs-target="#loginModal">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE = 'http://localhost/Learnify XAMP/api';
        let allCourses = [];
        let activeCategory = 'All';
        let enrolledIds = new Set();
        let localCart = JSON.parse(localStorage.getItem('learnify_cart') || '[]');
        let isLoggedIn = false;

        function updateGlobalCartBadge() {
            const badge = document.getElementById('global-cart-badge');
            if (!badge) return;
            const cart = JSON.parse(localStorage.getItem('learnify_cart') || '[]');
            if (cart.length > 0) {
                badge.textContent = cart.length;
                badge.classList.remove('d-none');
            } else {
                badge.classList.add('d-none');
            }
        }

        // ── Init ──────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            updateGlobalCartBadge();
            await checkSession();
            await loadCourses();

            const urlParams = new URLSearchParams(window.location.search);
            const categoryFromUrl = urlParams.get('category');
            if (categoryFromUrl) {
                setCategory(categoryFromUrl);
            }
        });

        // ── Session check ─────────────────────────────────────────────────────
        async function checkSession() {
            try {
                const res = await fetch(`${API_BASE}/cart.php?action=check`);
                const data = await res.json();
                if (data.loggedIn) {
                    isLoggedIn = true;
                    
                    // Restore user-specific cart into session cart
                    const userCart = JSON.parse(localStorage.getItem('learnify_cart_' + data.user.userID));
                    if (userCart) {
                        let currentCart = JSON.parse(localStorage.getItem('learnify_cart') || '[]');
                        localCart = [...new Set([...currentCart, ...userCart])];
                        localStorage.setItem('learnify_cart', JSON.stringify(localCart));
                    }

                    // Intercept cart saves to mirror them to this user's persistent cart
                    const origSet = localStorage.setItem;
                    localStorage.setItem = function(k, v) {
                        origSet.apply(this, arguments);
                        if (k === 'learnify_cart') origSet.call(this, 'learnify_cart_' + data.user.userID, v);
                    };

                    showLoggedInNav(data.user.name);
                    const enrolled = await fetch(`${API_BASE}/cart.php?action=list`);
                    const eData = await enrolled.json();
                    if (eData.success) enrolledIds = new Set(eData.enrollments.map(e => e.CourseID));
                }
            } catch {}
        }

        function showLoggedInNav(name) {
            document.getElementById('nav-login-btn').classList.add('d-none');
            document.getElementById('nav-register-btn').classList.add('d-none');
            document.getElementById('nav-user-name').textContent = `Hi, ${name.split(' ')[0]}!`;
            document.getElementById('nav-user-name').classList.remove('d-none');
            document.getElementById('nav-panel-link').classList.remove('d-none');
            document.getElementById('nav-logout-btn').classList.remove('d-none');
        }

        async function logout() {
            await fetch(`${API_BASE}/logout.php`);
            localStorage.removeItem('learnify_cart');
            location.reload();
        }

        // ── Load courses from PHP API ─────────────────────────────────────────
        async function loadCourses() {
            const grid = document.getElementById('coursesGrid');
            grid.innerHTML = `<div class="col-12 text-center py-5"><div class="spinner-border text-dark" role="status"></div></div>`;
            try {
                const res = await fetch(`${API_BASE}/courses.php`);
                const data = await res.json();
                allCourses = data.courses || [];
                buildCategoryBar();
                renderCourses(allCourses);
            } catch {
                grid.innerHTML = `<div class="col-12 text-center text-danger font-sans py-5">Failed to load courses. Make sure XAMPP is running.</div>`;
            }
        }

        // ── Category filter bar ───────────────────────────────────────────────
        function buildCategoryBar() {
            const cats = ['All', ...new Set(allCourses.map(c => c.Category))];
            const bar = document.getElementById('categoryBar');
            bar.innerHTML = cats.map(cat => `
                <button onclick="setCategory('${cat}')" class="btn rounded-pill px-4 py-2 font-sans fw-semibold text-nowrap border-0 shadow-sm ${cat === 'All' ? 'btn-dark text-white' : 'bg-white text-muted'}"
                    id="cat-${cat.replace(/\s/g,'_')}">${cat}</button>
            `).join('');
            setTimeout(handleScrollButtons, 100);
        }

        let scrollAnimationId = null;

        function scrollCategories(amount) {
            const bar = document.getElementById('categoryBar');
            if (!bar) return;
            
            if (scrollAnimationId) cancelAnimationFrame(scrollAnimationId);
            
            const start = bar.scrollLeft;
            const duration = 400; // ms
            let startTime = null;
            
            function animation(currentTime) {
                if (!startTime) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                let progress = Math.min(timeElapsed / duration, 1);
                
                // easeOutQuart 
                progress = 1 - Math.pow(1 - progress, 4);
                
                bar.scrollLeft = start + (amount * progress);
                
                if (timeElapsed < duration) {
                    scrollAnimationId = requestAnimationFrame(animation);
                }
            }
            scrollAnimationId = requestAnimationFrame(animation);
        }

        function handleScrollButtons() {
            const bar = document.getElementById('categoryBar');
            const leftBtn = document.getElementById('scrollLeftBtn');
            const rightBtn = document.getElementById('scrollRightBtn');
            
            if (!bar || !leftBtn || !rightBtn) return;

            if (bar.scrollWidth > bar.clientWidth) {
                if (bar.scrollLeft > 5) {
                    leftBtn.style.opacity = '1';
                    leftBtn.style.pointerEvents = 'auto';
                } else {
                    leftBtn.style.opacity = '0';
                    leftBtn.style.pointerEvents = 'none';
                }
                
                if (Math.ceil(bar.scrollLeft + bar.clientWidth) >= bar.scrollWidth - 5) {
                    rightBtn.style.opacity = '0';
                    rightBtn.style.pointerEvents = 'none';
                } else {
                    rightBtn.style.opacity = '1';
                    rightBtn.style.pointerEvents = 'auto';
                }
            } else {
                leftBtn.style.opacity = '0';
                leftBtn.style.pointerEvents = 'none';
                rightBtn.style.opacity = '0';
                rightBtn.style.pointerEvents = 'none';
            }
        }

        window.addEventListener('resize', handleScrollButtons);

        function setCategory(cat) {
            activeCategory = cat;
            document.querySelectorAll('#categoryBar button').forEach(b => {
                b.className = 'btn rounded-pill px-4 py-2 font-sans fw-semibold text-nowrap border-0 shadow-sm bg-white text-muted';
            });
            const active = document.getElementById(`cat-${cat.replace(/\s/g,'_')}`);
            if (active) active.className = 'btn rounded-pill px-4 py-2 font-sans fw-semibold text-nowrap border-0 shadow-sm btn-dark text-white';
            filterCourses();
        }

        function filterCourses() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCourses.filter(c =>
                (activeCategory === 'All' || c.Category === activeCategory) &&
                (c.CourseName.toLowerCase().includes(q) || c.Category.toLowerCase().includes(q) || c.Instructor.toLowerCase().includes(q))
            );
            renderCourses(filtered);
        }

        // ── Render cards ──────────────────────────────────────────────────────
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag]));
        }

        function renderCourses(courses) {
            const grid = document.getElementById('coursesGrid');
            const noMsg = document.getElementById('noCoursesMsg');
            if (!courses.length) { grid.innerHTML = ''; noMsg.classList.remove('d-none'); return; }
            noMsg.classList.add('d-none');
            grid.innerHTML = courses.map(c => {
                const enrolled = enrolledIds.has(c.CourseID);
                return `
                <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden group">
                        <div class="position-relative bg-light" style="padding-top:56.25%;">
                            <img src="${escapeHTML(c.Image) || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600'}"
                                class="position-absolute top-0 w-100 h-100 object-fit-cover" alt="${escapeHTML(c.CourseName)}" onerror="this.src='https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600'">
                            <span class="position-absolute top-0 end-0 m-3 px-3 py-1 bg-white rounded-pill font-sans fw-bold shadow-sm" style="font-size:0.875rem; color:#111827;">₹${parseFloat(c.Price).toFixed(0)}</span>
                        </div>
                        <div class="card-body p-4 d-flex flex-column bg-white">
                            <span class="text-uppercase fw-bold text-primary mb-2" style="font-size:0.75rem; letter-spacing:0.05em;">${escapeHTML(c.Category)}</span>
                            <h3 class="fs-6 fw-bold font-sans mb-2" style="color:#111827; line-height:1.4;">${escapeHTML(c.CourseName)}</h3>
                            <div class="mt-auto pt-3 border-top" style="border-color:#f3f4f6 !important;">
                                <p class="text-muted font-sans mb-3" style="font-size:0.875rem;">By ${escapeHTML(c.Instructor)}</p>
                                ${enrolled
                                    ? `<button class="btn w-100 rounded-pill py-2 font-sans fw-bold border-0" style="background:#d1fae5; color:#065f46;" disabled>
                                           <span class="material-symbols-outlined align-middle me-1" style="font-size:1rem;">check_circle</span>Enrolled
                                       </button>`
                                    : `<div class="d-flex gap-2 w-100">
                                           <button class="btn btn-outline-dark rounded-pill py-2 font-sans fw-bold d-flex align-items-center justify-content-center px-3" title="Add to Cart" onclick="addToCart(${c.CourseID}, this)" ${localCart.includes(c.CourseID) ? 'disabled' : ''}>
                                               ${localCart.includes(c.CourseID) 
                                                  ? '<span class="material-symbols-outlined align-middle" style="font-size:1.125rem;">check</span>'
                                                  : '<span class="material-symbols-outlined align-middle" style="font-size:1.125rem;">add_shopping_cart</span>'
                                               }
                                           </button>
                                           <button class="btn btn-dark rounded-pill py-2 font-sans fw-bold border-0 flex-grow-1" onclick="buyNow(${c.CourseID}, this)">
                                               Buy Now
                                           </button>
                                       </div>`
                                }
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Add to cart / buy now ──────────────────────────────────────────────
        async function addToCart(courseID, btn) {
            try {
                const res = await fetch(`${API_BASE}/cart.php?action=check`);
                const data = await res.json();
                if (!data.loggedIn) {
                    new bootstrap.Modal(document.getElementById('loginModal')).show();
                    return;
                }
            } catch (err) {
                 showToast('Error verifying session.', true);
                 return;
            }

            if (!localCart.includes(courseID)) {
                localCart.push(courseID);
                localStorage.setItem('learnify_cart', JSON.stringify(localCart));
                updateGlobalCartBadge();
            }
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined align-middle" style="font-size:1.125rem;">check</span>';
            showToast('Added to Cart!');
        }

        async function buyNow(courseID, btn) {
            btn.disabled = true;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span>';
            try {
                const res = await fetch(`${API_BASE}/cart.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courseID })
                });
                const data = await res.json();
                if (res.status === 401) {
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                    new bootstrap.Modal(document.getElementById('registerModal')).show();
                } else if (data.success) {
                    enrolledIds.add(courseID);
                    showToast('Enrolled successfully! 🎉');
                    if (btn.parentElement && btn.parentElement.classList.contains('d-flex')) {
                        btn.parentElement.outerHTML = `<button class="btn w-100 rounded-pill py-2 font-sans fw-bold border-0" style="background:#d1fae5; color:#065f46;" disabled>
                            <span class="material-symbols-outlined align-middle me-1" style="font-size:1rem;">check_circle</span>Enrolled</button>`;
                    } else {
                        btn.outerHTML = `<button class="btn w-100 rounded-pill py-2 font-sans fw-bold border-0" style="background:#d1fae5; color:#065f46;" disabled>
                            <span class="material-symbols-outlined align-middle me-1" style="font-size:1rem;">check_circle</span>Enrolled</button>`;
                    }
                } else {
                    showToast(data.message || 'Something went wrong.', true);
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                }
            } catch {
                showToast('Network error. Please try again.', true);
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        // ── Login form submit ─────────────────────────────────────────────────
        async function submitLogin(e) {
            e.preventDefault();
            const errEl = document.getElementById('loginError');
            errEl.classList.add('d-none');
            const res = await fetch(`${API_BASE}/login.php`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value })
            });
            const data = await res.json();
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
                showLoggedInNav(data.user.name);

                const enrolled = await fetch(`${API_BASE}/cart.php?action=list`);
                const eData = await enrolled.json();
                if (eData.success) enrolledIds = new Set(eData.enrollments.map(e => e.CourseID));
                renderCourses(allCourses.filter(c => activeCategory === 'All' || c.Category === activeCategory));
                showToast('Logged in successfully!');
            } else {
                errEl.textContent = data.message;
                errEl.classList.remove('d-none');
            }
        }

        // ── Register form submit ──────────────────────────────────────────────
        async function submitRegister(e) {
            e.preventDefault();
            const errEl = document.getElementById('registerError');
            const sucEl = document.getElementById('registerSuccess');
            errEl.classList.add('d-none');
            sucEl.classList.add('d-none');
            const res = await fetch(`${API_BASE}/register.php`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: regName.value, email: regEmail.value, password: regPassword.value })
            });
            const data = await res.json();
            if (data.success) {
                sucEl.textContent = data.message;
                sucEl.classList.remove('d-none');
                document.getElementById('registerForm').reset();
                setTimeout(() => {
                    bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
                    new bootstrap.Modal(document.getElementById('loginModal')).show();
                }, 1500);
            } else {
                errEl.textContent = data.message;
                errEl.classList.remove('d-none');
            }
        }

        // ── Toast helper ──────────────────────────────────────────────────────
        function showToast(msg, isError = false) {
            const t = document.getElementById('liveToast');
            t.style.backgroundColor = isError ? '#dc2626' : '#111827';
            document.getElementById('toastMsg').textContent = msg;
            bootstrap.Toast.getOrCreateInstance(t, { delay: 3000 }).show();
        }
    </script>

        .group:hover .object-fit-cover { transform: scale(1.04); transition: transform 0.4s ease; }
        #categoryBar::-webkit-scrollbar { display: none; }
    </style>
