<div class="container-fluid py-4 max-w-7xl mx-auto" style="max-width: 1400px;">
    <!-- Welcome Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="font-sans fw-bold fs-2" style="color: #111827;">My Dashboard</h1>
            <p class="text-muted font-sans mb-0">Discover and enroll in your favorite courses.</p>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="position-relative">
                <span class="material-symbols-outlined position-absolute top-50 translate-middle-y ms-3 text-muted"
                    style="pointer-events: none;">search</span>
                <input type="text" class="form-control rounded-pill bg-white border-0 shadow-sm ps-5 py-2 font-sans"
                    placeholder="Search courses..." ng-model="searchQuery" style="width: 300px;">
            </div>
        </div>
    </div>

    <!-- Category Filters -->
    <div class="d-flex gap-2 overflow-auto pb-3 mb-4 no-scrollbar">
        <button ng-repeat="cat in categories"
            class="btn rounded-pill px-4 py-2 font-sans fw-semibold transition-colors border-0 text-nowrap"
            ng-class="{'btn-dark text-white shadow-sm': categoryFilter === cat, 'bg-white text-muted shadow-sm hover-bg-light': categoryFilter !== cat}"
            ng-click="setCategory(cat)">
            {{cat}}
        </button>
    </div>

    <!-- Courses Grid -->
    <div class="row g-4">
        <!-- Message if no courses match -->
        <div class="col-12 text-center py-5"
            ng-if="(courses | filter:{title: searchQuery} | filter:filterByCategory).length === 0">
            <span class="material-symbols-outlined text-muted mb-3" style="font-size: 3rem;">search_off</span>
            <h4 class="font-sans fw-semibold text-muted">No courses found matching your criteria.</h4>
            <button class="btn btn-outline-dark rounded-pill mt-3" ng-click="searchQuery = ''; setCategory('All')">Clear
                Filters</button>
        </div>

        <!-- Course Card using ng-repeat -->
        <div class="col-12 col-md-6 col-lg-4 col-xl-3"
            ng-repeat="course in courses | filter:{title: searchQuery} | filter:filterByCategory">
            <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden card-custom group">
                <div class="position-relative bg-light" style="padding-top: 56.25%;">
                    <img ng-src="{{course.image}}"
                        class="position-absolute top-0 w-100 h-100 object-fit-cover transition-transform group-hover-scale"
                        alt="{{course.title}}">
                    <span
                        class="position-absolute top-0 end-0 m-3 px-3 py-1 bg-white rounded-pill font-sans fw-bold shadow-sm"
                        style="font-size: 0.875rem; color: #111827;">
                        {{course.price}}
                    </span>
                </div>
                <div class="card-body p-4 d-flex flex-column bg-white">
                    <span class="text-uppercase fw-bold text-primary mb-2"
                        style="font-size: 0.75rem; letter-spacing: 0.05em;">{{course.category}}</span>
                    <h3 class="fs-5 fw-bold font-sans mb-2" style="color: #111827; line-height: 1.4;">{{course.title}}
                    </h3>

                    <div class="mt-auto pt-3 border-top" style="border-color: #f3f4f6 !important;">
                        <div class="d-flex align-items-center justify-content-between">
                            <span class="text-muted font-sans" style="font-size: 0.875rem;">By
                                {{course.instructor}}</span>
                            <div class="d-flex align-items-center gap-1">
                                <span class="material-symbols-outlined text-warning"
                                    style="font-size: 1rem; font-variation-settings: 'FILL' 1;">star</span>
                                <span class="fw-bold font-sans" style="font-size: 0.875rem;">{{course.rating}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Hide scrollbar for category pills wrapper */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }

    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    .object-fit-cover {
        object-fit: cover;
    }
</style>
